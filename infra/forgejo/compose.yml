services:
  forgejo:
    image: data.forgejo.org/forgejo/forgejo:15.0.3
    container_name: tabellio-forgejo
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/forgejo/forgejo.db
      FORGEJO__server__DOMAIN: 127.0.0.1
      FORGEJO__server__ROOT_URL: http://127.0.0.1:3300/
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__server__SSH_DOMAIN: 127.0.0.1
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__actions__ENABLED: "false"
    ports:
      - "127.0.0.1:3300:3000"
      - "127.0.0.1:2222:22"
    volumes:
      - ../../.tabellio/forgejo/data:/data
    restart: unless-stopped
