name: product-validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: {node-version: 22}
      - name: Resolve squash-merge checkpoint revision
        id: checkpoint
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          MERGED_COMMIT: ${{ github.sha }}
        run: |
          set -o pipefail
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/$GITHUB_REPOSITORY/commits/$MERGED_COMMIT/pulls" \
            | node scripts/resolve-merged-checkpoint.mjs \
                --commit "$MERGED_COMMIT" \
                --github-output "$GITHUB_OUTPUT"
      - name: Fetch squash-merge checkpoint revision
        if: github.event_name == 'push' && steps.checkpoint.outputs.found == 'true'
        env:
          CHECKPOINT_FETCH_REF: ${{ steps.checkpoint.outputs.fetch_ref }}
          CHECKPOINT_LOCAL_REF: ${{ steps.checkpoint.outputs.local_ref }}
          CHECKPOINT_EXPECTED_HEAD: ${{ steps.checkpoint.outputs.head }}
        run: |
          git fetch --no-tags origin "+$CHECKPOINT_FETCH_REF:$CHECKPOINT_LOCAL_REF"
          actual_head="$(git rev-parse "$CHECKPOINT_LOCAL_REF^{commit}")"
          test "$actual_head" = "$CHECKPOINT_EXPECTED_HEAD"
      - name: Validate exact candidate
        env:
          CHECKPOINT_FOUND: ${{ steps.checkpoint.outputs.found }}
          CHECKPOINT_HEAD: ${{ steps.checkpoint.outputs.head }}
        run: |
          set -o pipefail
          base_ref=origin/main
          checkpoint_args=()
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            base_ref=HEAD^
            if [ "$CHECKPOINT_FOUND" = "true" ]; then
              checkpoint_args=(--checkpoint-base "$base_ref" --checkpoint-head "$CHECKPOINT_HEAD")
            fi
          fi
          install -m 755 scripts/tabellio-validator.mjs "$RUNNER_TEMP/tabellio-validator"
          PATH="$RUNNER_TEMP:$PATH" node scripts/tabellio-validate.mjs gate \
            --repo . \
            --repo-id IntelIP/Tabellio \
            --base "$base_ref" \
            --commit HEAD \
            "${checkpoint_args[@]}" \
            --manifest tabellio.validation.json | tee tabellio-validation-result.json
      - name: Upload validation result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tabellio-validation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            tabellio-validation-result.json
            refs/tabellio/validations/
          if-no-files-found: warn
