name: Tabellio Evidence

on:
  pull_request:
  workflow_dispatch:
    inputs:
      evidence_path:
        description: Path to the evidence envelope.
        required: false
        default: tabellio-pr-evidence.json
        type: string
      context_path:
        description: Path to the native Git context packet.
        required: false
        default: tabellio-context.json
        type: string
      validation_command:
        description: Command to run before writing evidence.
        required: false
        default: ""
        type: string
      toolkit_ref:
        description: Tabellio toolkit ref for fallback scripts. Pin to the same ref as the reusable workflow.
        required: false
        type: string
  workflow_call:
    inputs:
      evidence_path:
        description: Path to the evidence envelope.
        required: false
        default: tabellio-pr-evidence.json
        type: string
      context_path:
        description: Path to the native Git context packet.
        required: false
        default: tabellio-context.json
        type: string
      validation_command:
        description: Command to run before writing evidence.
        required: false
        default: ""
        type: string
      toolkit_ref:
        description: Tabellio toolkit ref for fallback scripts. Pin to the same ref as the reusable workflow.
        required: false
        type: string

permissions:
  contents: read

jobs:
  evidence:
    name: Tabellio evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Tabellio
        id: tabellio_tests
        if: ${{ github.repository == 'IntelIP/Tabellio' }}
        run: npm run check

      - name: Optional validation command
        id: validation
        if: ${{ inputs.validation_command }}
        run: ${{ inputs.validation_command }}

      - name: Resolve Tabellio toolkit path
        id: toolkit
        if: ${{ always() }}
        shell: bash
        env:
          TOOLKIT_REF: ${{ inputs.toolkit_ref || '' }}
        run: |
          if [ "$GITHUB_REPOSITORY" = "IntelIP/Tabellio" ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          elif [ -n "$TOOLKIT_REF" ]; then
            echo "path=.tabellio/toolkit" >> "$GITHUB_OUTPUT"
            echo "ref=$TOOLKIT_REF" >> "$GITHUB_OUTPUT"
          elif [ -f scripts/write-tabellio-evidence-envelope.mjs ] && \
            [ -f scripts/capture-tabellio-context.mjs ] && \
            [ -f scripts/check-tabellio-context.mjs ] && \
            [ -f scripts/check-tabellio-evidence-envelope.mjs ] && \
            [ -f scripts/check-tabellio-external-actions.mjs ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          else
            echo "::error::toolkit_ref is required when Tabellio scripts are not vendored. Pin it to the same ref as the reusable workflow."
            echo "path=.tabellio/toolkit" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Checkout Tabellio toolkit
        if: ${{ always() && steps.toolkit.outputs.path == '.tabellio/toolkit' && steps.toolkit.outputs.ref != '' }}
        uses: actions/checkout@v5
        with:
          repository: IntelIP/Tabellio
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .tabellio/toolkit
          persist-credentials: false

      - name: Write evidence envelope
        if: ${{ always() && steps.toolkit.outcome == 'success' }}
        shell: bash
        run: |
          node "${TOOLKIT_PATH}/scripts/capture-tabellio-context.mjs" \
            --repo "${GITHUB_WORKSPACE}" \
            --repo-id "${GITHUB_REPOSITORY}" \
            --base "${BASE_SHA}" \
            --base-name "${BASE_NAME}" \
            --head "${HEAD_SHA}" \
            --head-name "${HEAD_NAME}" \
            --run-id "${GITHUB_RUN_ID}" \
            --task-summary "Tabellio context captured for ${GITHUB_WORKFLOW}." \
            --actor "${GITHUB_ACTOR}" \
            --actor-type ci \
            --out "${CONTEXT_PATH}"
          node "${TOOLKIT_PATH}/scripts/write-tabellio-evidence-envelope.mjs" \
            --context "${CONTEXT_PATH}" \
            --out "${EVIDENCE_PATH}"
        env:
          TOOLKIT_PATH: ${{ steps.toolkit.outputs.path }}
          EVIDENCE_PATH: ${{ inputs.evidence_path || 'tabellio-pr-evidence.json' }}
          CONTEXT_PATH: ${{ inputs.context_path || 'tabellio-context.json' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          BASE_NAME: ${{ github.base_ref || github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HEAD_NAME: ${{ github.head_ref || github.ref_name }}
          TABELLIO_REQUIRED_VALIDATION_COMMAND: ${{ github.repository == 'IntelIP/Tabellio' && 'npm run check' || '' }}
          TABELLIO_REQUIRED_VALIDATION_STATUS: ${{ steps.tabellio_tests.outcome || 'skipped' }}
          TABELLIO_VALIDATION_COMMAND: ${{ inputs.validation_command || '' }}
          TABELLIO_VALIDATION_STATUS: ${{ steps.validation.outcome || 'skipped' }}
          TABELLIO_WRITER_COMMAND: node ${{ steps.toolkit.outputs.path }}/scripts/write-tabellio-evidence-envelope.mjs

      - name: Validate native Git context
        if: ${{ always() && steps.toolkit.outcome == 'success' }}
        run: node "${TOOLKIT_PATH}/scripts/check-tabellio-context.mjs" --context "${CONTEXT_PATH}"
        env:
          TOOLKIT_PATH: ${{ steps.toolkit.outputs.path }}
          CONTEXT_PATH: ${{ inputs.context_path || 'tabellio-context.json' }}

      - name: Validate evidence envelope
        if: ${{ always() && steps.toolkit.outcome == 'success' }}
        run: node "${TOOLKIT_PATH}/scripts/check-tabellio-evidence-envelope.mjs" --evidence "${EVIDENCE_PATH}"
        env:
          TOOLKIT_PATH: ${{ steps.toolkit.outputs.path }}
          EVIDENCE_PATH: ${{ inputs.evidence_path || 'tabellio-pr-evidence.json' }}

      - name: Check external action policy
        if: ${{ always() && steps.toolkit.outcome == 'success' }}
        run: node "${TOOLKIT_PATH}/scripts/check-tabellio-external-actions.mjs" --evidence "${EVIDENCE_PATH}"
        env:
          TOOLKIT_PATH: ${{ steps.toolkit.outputs.path }}
          EVIDENCE_PATH: ${{ inputs.evidence_path || 'tabellio-pr-evidence.json' }}

      - name: Upload evidence artifact
        if: ${{ always() && steps.toolkit.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: tabellio-pr-evidence
          path: |
            ${{ inputs.evidence_path || 'tabellio-pr-evidence.json' }}
            ${{ inputs.context_path || 'tabellio-context.json' }}
